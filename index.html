<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✨ KHẢO BÀI TỪ VỰNG ✨</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#ffe6f0,#e0f7fa);
  margin:0;padding:0;
}

.container{
  max-width:900px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  color:#ff4da6;
}

.header{
  text-align:center;
  margin-bottom:15px;
}

#username{
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
  width:60%;
  text-align:center;
}

#timer{
  text-align:center;
  font-size:18px;
  margin:10px;
}

.question{
  background:#f9f9f9;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
}

.unanswered{
  border:2px solid red;
  background:#fff0f0;
}

.answers label{
  display:block;
  margin:5px 0;
  cursor:pointer;
}

button{
  display:block;
  margin:20px auto;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff4da6;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

#result{
  margin-top:20px;
}

#leaderboard{
  margin-top:10px;
}
</style>
</head>

<body oncontextmenu="return false;">

<div class="container">

<h1>✨ KHẢO BÀI TỪ VỰNG EXTRA READING ✨</h1>

<div class="header">
<input id="username" placeholder="Nhập tên của bạn...">
</div>

<div id="timer">⏳ 15:00</div>

<div id="quiz"></div>

<button onclick="submitQuiz()">Nộp bài</button>

<div id="result"></div>

<h3>🏆 Bảng xếp hạng</h3>
<div id="leaderboard"></div>

</div>

<script>
let tabSwitchCount = 0; 

document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    tabSwitchCount++;

    alert("⚠️ Bạn đã rời tab (" + tabSwitchCount + " lần)");

    if(tabSwitchCount >= 3){
      alert("❌ Bạn rời tab quá nhiều!");
      submitQuiz();
    }
  }
});

// 🔀 random
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// 📚 DATA
let originalQuestions = [ 
{
  q: "Many young people fail to reach their full potential because they become comfortable with ______ instead of continuing to improve.",
  a: ["perseverance", "mediocrity", "resilience", "conviction"],
  c: 1
},
{
  q: "The hotel offers every guest a ______ breakfast at no additional cost.",
  a: ["comprehensive", "elaborate", "complimentary", "superficial"],
  c: 2
},
{
  q: "The scientist repeated the experiment several times to ensure the results were completely ______.",
  a: ["prosperous", "precise", "delayed", "harsh"],
  c: 1
},
{
  q: "His inspiring speech encouraged many students to ______ new challenges instead of avoiding them.",
  a: ["censor", "embrace", "expire", "distribute"],
  c: 1
},
{
  q: "Too much ______ has been linked to an increased risk of heart disease.",
  a: ["refined sugar", "solitude", "saturated fat", "novelty"],
  c: 2
},
{
  q: "Air and clean drinking water are ______ for human survival.",
  a: ["exclusive", "indispensable", "complimentary", "elaborate"],
  c: 1
},
{
  q: "Instead of giving a clear explanation, his answer remained very ______ and failed to address the real issue.",
  a: ["holistic", "superficial", "prosperous", "dynamic"],
  c: 1
},
{
  q: "The speaker was able to ______ difficult scientific ideas in language that everyone could understand.",
  a: ["articulate", "deploy", "designate", "cultivate"],
  c: 0
},
{
  q: "The invention was considered a remarkable ______ because it introduced a completely new way of producing clean energy.",
  a: ["gratification", "novelty", "mediocrity", "solitude"],
  c: 1
},
{
  q: "The university promotes a ______ approach to education by developing students academically, physically, and emotionally.",
  a: ["comprehensive", "impulsive", "elaborate", "censored"],
  c: 0
},
{
  q: "Rather than seeking immediate ______, successful people are willing to work hard for long-term rewards.",
  a: ["discernment", "gratification", "conviction", "resilience"],
  c: 1
},
{
  q: "Over many years, small daily investments can ______ into a significant amount of wealth.",
  a: ["account", "accumulate", "deploy", "navigate"],
  c: 1
},
{
  q: "Many successful athletes believe that talent alone is never enough without ______.",
  a: ["perseverance", "mediocrity", "solitude", "censorship"],
  c: 0
},
{
  q: "The detective carefully ______ every piece of evidence before identifying the suspect.",
  a: ["cultivated", "intensified", "scrutinized", "complimented"],
  c: 2
},
{
  q: "Experience and careful observation help us develop better ______ when making important decisions.",
  a: ["resilience", "discernment", "novelty", "relationship"],
  c: 1
},
{
  q: "Parents should encourage children to ______ good reading habits from an early age.",
  a: ["undertake", "cultivate", "account", "expire"],
  c: 1
},
{
  q: "Her honesty and willingness to help others ______ from the other applicants.",
  a: ["accounted for", "set her apart", "paid off", "made up"],
  c: 1
},
{
  q: "The company plans to ______ a new environmental policy beginning next month.",
  a: ["implement", "dissect", "criticize", "savor"],
  c: 0
},
{
  q: "The teacher asked students to ______ the experiment before writing their reports.",
  a: ["conduct", "expire", "distribute", "compliment"],
  c: 0
},
{
  q: "The police warned citizens not to ______ fake news ______ reliable information.",
  a: ["attribute ... to", "mistake ... for", "account ... for", "designate ... as"],
  c: 1
},
{
  q: "The report clearly ______ that early intervention is the most effective way to reduce school dropout rates.",
  a: ["distributes", "censors", "underscores", "expires"],
  c: 2
},
{
  q: "The documentary explained how social media algorithms can ______ people to spend more time online.",
  a: ["prompt", "cultivate", "designate", "compliment"],
  c: 0
},
{
  q: "Although the contract had already ______, both companies agreed to negotiate a new one.",
  a: ["deployed", "expired", "intensified", "resonated"],
  c: 1
},
{
  q: "The university decided to ______ the application deadline because many students had experienced technical problems.",
  a: ["distribute", "dissect", "extend", "cultivate"],
  c: 2
},
{
  q: "The professor spent an hour ______ the poem so that students could understand every hidden meaning.",
  a: ["elaborating on", "censoring", "deploying", "complimenting"],
  c: 0
},
{
  q: "The government officially ______ the old theater ______ a national cultural heritage site.",
  a: ["attributed ... to", "designated ... as", "mistook ... for", "accounted ... for"],
  c: 1
},
{
  q: "The company hopes the new software will ______ the process of approving customer requests.",
  a: ["accelerate", "scrutinize", "savor", "expire"],
  c: 0
},
{
  q: "There are currently several ______ for experienced engineers at our headquarters.",
  a: ["means of transport", "job vacancies", "collective efforts", "complimentary breakfasts"],
  c: 1
},
{
  q: "The old factory has been ______ for more than two years and is now completely empty.",
  a: ["resonated", "vacated", "articulated", "implemented"],
  c: 1
},
{
  q: "Public transportation is an affordable ______ reducing traffic congestion in large cities.",
  a: ["account of", "means of", "gratification of", "relationship with"],
  c: 1
},
{
  q: "On quiet Sunday mornings, my grandfather enjoys ______ while reading the newspaper.",
  a: ["carrying out a survey", "savoring a cup of tea", "making up a story", "passing a law"],
  c: 1
},
{
  q: "Thanks to years of wise economic policies, the country has become increasingly ______.",
  a: ["superficial", "prosperous", "delayed", "elaborate"],
  c: 1
},
{
  q: "Scientists continue to study the ______ between sleep quality and memory.",
  a: ["relationship", "mediocrity", "novelty", "solitude"],
  c: 0
},
{
  q: "The rescue team showed great courage by entering the burning building to save the children.",
  a: ["prosperous", "brave", "impulsive", "superficial"],
  c: 1
},
{
  q: "Thousands of volunteers ______ money, food, and medicine to families affected by the flood.",
  a: ["complimented", "contributed", "censored", "designated"],
  c: 1
},
{
  q: "The charity organized volunteers to ______ food supplies fairly among all affected villages.",
  a: ["distribute", "account for", "resonate", "cultivate"],
  c: 0
},
{
  q: "The artist's latest exhibition deeply ______ with young people because it reflected many of their real-life struggles.",
  a: ["resonated", "deployed", "expired", "vacated"],
  c: 0
},
{
  q: "The engineer designed two machines that perfectly ______ each other, making the production process much more efficient.",
  a: ["complimented", "complemented", "censored", "accelerated"],
  c: 1
},
{
  q: "The teacher gave Lucy a sincere ______ after she delivered an excellent presentation.",
  a: ["complement", "compliment", "resilience", "conviction"],
  c: 1
},
{
  q: "During emergencies, medical teams are quickly ______ to areas where help is most urgently needed.",
  a: ["deployed", "cultivated", "vacated", "prolonged"],
  c: 0
}
];


// 🔀 RANDOM CÂU + ĐÁP ÁN
let questions = shuffle(originalQuestions.map(q=>{
  let opts = q.a.map((t,i)=>({t,correct:i===q.c}));
  opts = shuffle(opts);
  return {
    q:q.q,
    a:opts.map(o=>o.t),
    c:opts.findIndex(o=>o.correct)
  };
}));

// render
const quizDiv=document.getElementById("quiz");

questions.forEach((q,i)=>{
  let div=document.createElement("div");
  div.className="question";

  let html=`<b>${i+1}. ${q.q}</b>`;

  q.a.forEach((ans,idx)=>{
    html+=`
    <div class="answers">
      <label>
        <input type="radio" name="q${i}" value="${idx}">
        ${String.fromCharCode(65+idx)}. ${ans}
      </label>
    </div>`;
  });

  div.innerHTML=html;
  quizDiv.appendChild(div);
});

// ⏱ timer
let time=1200;
let timer=setInterval(()=>{
  let m=Math.floor(time/60);
  let s=time%60;
  document.getElementById("timer").innerText=`⏳ ${m}:${s<10?"0"+s:s}`;
  time--;
  if(time<0){clearInterval(timer);submitQuiz();}
},1000);

// submit
function submitQuiz(){
  let name=document.getElementById("username").value.trim();
  if(!name){alert("Nhập tên!");return;}
let hasEmpty = false;

// kiểm tra câu chưa làm
questions.forEach((q,i)=>{
  let selected=document.querySelector(`input[name=q${i}]:checked`);
  let div=document.getElementsByClassName("question")[i];

  div.classList.remove("unanswered");

  if(!selected){
    div.classList.add("unanswered");
    hasEmpty = true;
  }
});

if(hasEmpty){
  alert("❌ Bạn phải làm hết câu trước khi nộp!");
  return;
}
  clearInterval(timer);

  let score=0;
  let wrongList=[];

  questions.forEach((q,i)=>{
    let selected=document.querySelector(`input[name=q${i}]:checked`);
    if(!selected)return;

    let val=parseInt(selected.value);

    if(val===q.c){
      score++;
    } else {
      wrongList.push({
        question:q.q,
        your:String.fromCharCode(65+val)+". "+q.a[val],
        correct:String.fromCharCode(65+q.c)+". "+q.a[q.c]
      });
    }
  });

  // ⭐ TIME
  let now = new Date().toLocaleString();

  // hiển thị
  let wrongRate = wrongList.length / questions.length;

let resultHTML = `
🎉 <b>${name}</b> đúng <b>${score}/${questions.length}</b><br>
⏰ ${now}<br>
⚠️ TabSwitch: ${tabSwitchCount || 0}<br><br>
`;

if(wrongRate < 0.3){

    resultHTML += `
    <h3>📚 Đáp án các câu sai</h3>
    `;

    wrongList.forEach((w,i)=>{
        resultHTML += `
        <div style="
            border:1px solid #ddd;
            padding:10px;
            margin-bottom:10px;
            border-radius:10px;
            background:#fff8e6;
        ">
            <b>Câu ${i+1}</b><br>
            ${w.question}<br><br>

            ❌ Bạn chọn: <span style="color:red">${w.your}</span><br>
            ✅ Đáp án: <span style="color:green">${w.correct}</span>
        </div>
        `;
    });

}else{

    resultHTML += `
    <div style="
        background:#ffeaea;
        padding:15px;
        border-radius:12px;
        color:#c00000;
        font-weight:bold;
    ">
    ❌ Sai trên 30% mà đòi mấy đáp án của mẹ hả cưng?<br>
    Học bài kỹ vô bữa sau mẹ khảo lại!
    </div>
    `;
}

document.getElementById("result").innerHTML = resultHTML;

  // ⭐ GỬI DATA FULL
  fetch("https://script.google.com/macros/s/AKfycbwKGHpjJy1RxNpGRIHdZtQiPfCrh0OSG24DEzQtRB7Ezlr1aki97aZL0JfQiSwkKmYmrg/exec",{
    method:"POST",
    body:JSON.stringify({
      time: now,
      name: name,
      score: score,
      total: questions.length,
      tabSwitch: tabSwitchCount || 0,
      wrong: wrongList.map((w,i)=>
        (i+1)+". "+w.question+
        " | Bạn chọn: "+w.your+
        " | Đúng: "+w.correct
      ).join("\n")
    })
  });
}

</script>

</body>
</html>
