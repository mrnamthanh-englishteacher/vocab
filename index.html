<style>

<body oncontextmenu="return false;">

<div class="container">

<h1>✨ KHẢO BÀI TỪ VỰNG VOCAB UNIT 2 (LẦN 1) ✨</h1>

<div class="header">
<input id="username" placeholder="Nhập tên của bạn...">
</div>

<div id="timer">⏳ 15:00</div>

<div id="quiz"></div>

<button onclick="submitQuiz()">Nộp bài</button>

<div id="result"></div>

<h3>🏆 Bảng xếp hạng</h3>
<div id="leaderboard"></div>

</div>

<script>
let tabSwitchCount = 0; 

document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    tabSwitchCount++;

    alert("⚠️ Bạn đã rời tab (" + tabSwitchCount + " lần)");

    if(tabSwitchCount >= 3){
      alert("❌ Bạn rời tab quá nhiều!");
      submitQuiz();
    }
  }
});

// 🔀 random
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

// 📚 DATA
let originalQuestions = [ 
{
  q: "The phrase <b>all over the globe</b> most nearly means ______.",
  a: ["ở ngoài không gian", "trên toàn thế giới", "quanh một thành phố", "dưới lòng đất"],
  c: 1
},
{
  q: "The phrase <b>on a global scale</b> means ______.",

  c: 2
},
{
  q: "The phrase <b>a rich diversity of cultures</b> means ______.",

  c: 2
},
{
  q: "The phrase <b>cultural diversity</b> means ______.",
  a: ["đa dạng văn hóa", "bản sắc dân tộc", "di sản văn hóa", "giao lưu văn hóa"],
  c: 0
},
{
  q: "The term <b>biodiversity</b> refers to ______.",
  a: ["đa dạng địa lý", "đa dạng dân số", "đa dạng sinh học", "đa dạng ngôn ngữ"],
  c: 2
},
{
  q: "The phrase <b>religious beliefs</b> means ______.",
  a: ["tín ngưỡng tôn giáo", "nghi lễ tôn giáo", "tổ chức tôn giáo", "niềm tin mạnh mẽ"],
  c: 0
},
{
  q: "The idiom <b>beyond belief</b> means ______.",
  a: ["khó tin đến mức không thể tin nổi", "đáng để suy nghĩ", "rất hợp lý", "hoàn toàn chính xác"],
  c: 0
},
{
  q: "The adjective <b>plausible</b> means ______.",
  a: ["hợp lý, có vẻ đáng tin", "phi lý", "đáng sợ", "khó hiểu"],
  c: 0
},
{
  q: "The verb <b>customize</b> means ______.",
  a: ["tiêu chuẩn hóa", "sản xuất hàng loạt", "tùy chỉnh theo yêu cầu", "nhập khẩu"],
  c: 2
},
{
  q: "The adjective <b>customary</b> means ______.",
  a: ["theo thông lệ, tập quán", "mang tính hiện đại", "mang tính truyền thống cổ xưa", "hiếm gặp"],
  c: 0
},
{
  q: "The structure <b>respect somebody for something</b> means ______.",
  a: ["tranh luận với ai về điều gì", "tôn trọng ai vì điều gì", "giúp ai làm điều gì", "trách ai vì điều gì"],
  c: 1
},
{
  q: "The phrase <b>in many respects</b> means ______.",
  a: ["trong nhiều khía cạnh", "ở nhiều quốc gia", "trong nhiều năm", "nhiều lần"],
  c: 0
},
{
  q: "The phrase <b>hands-on experience</b> means ______.",
  a: ["kinh nghiệm thực tế", "kinh nghiệm lý thuyết", "kinh nghiệm giảng dạy", "kinh nghiệm quản lý"],
  c: 0
},
{
  q: "The idiom <b>put it down to experience</b> means ______.",
  a: ["coi đó là bài học kinh nghiệm", "ghi chép kinh nghiệm", "chia sẻ kinh nghiệm", "mô tả trải nghiệm"],
  c: 0
},
{
  q: "The structure <b>encourage somebody to do something</b> means ______.",
  a: ["bắt ai làm gì", "cho phép ai làm gì", "khuyến khích ai làm gì", "nhờ ai làm gì"],
  c: 2
},
{
  q: "The adjective <b>encouraging</b> means ______.",
  a: ["đầy hứa hẹn, đáng khích lệ", "đáng thất vọng", "nguy hiểm", "khó hiểu"],
  c: 0
},
{
  q: "The adjective <b>courageous</b> means ______.",
  a: ["thông minh", "can đảm", "kiên nhẫn", "khiêm tốn"],
  c: 1
},
{
  q: "The phrase <b>on special</b> means ______.",
  a: ["đang được giảm giá", "rất đặc biệt", "giới hạn số lượng", "bán độc quyền"],
  c: 0
},
{
  q: "The noun <b>specialty</b> means ______.",
  a: ["món ăn đặc sản hoặc chuyên môn", "ưu điểm", "sở thích", "nghề nghiệp"],
  c: 0
},
{
  q: "The structure <b>specialize in something</b> means ______.",
  a: ["nghiên cứu về", "chuyên về", "nổi tiếng vì", "quan tâm đến"],
  c: 1
},
{
  q: "The adverb <b>especially</b> means ______.",
  a: ["đặc biệt là", "hiếm khi", "gần như", "hoàn toàn"],
  c: 0
},
{
  q: "The adjective <b>captivated</b> means ______.",
  a: ["bị cuốn hút, mê hoặc", "rất lo lắng", "hoàn toàn thất vọng", "cực kỳ tức giận"],
  c: 0
},
{
  q: "The structure <b>present something to somebody</b> means ______.",
  a: ["trình bày hoặc trao cái gì cho ai", "mượn cái gì từ ai", "bán cái gì cho ai", "giữ cái gì cho ai"],
  c: 0
},
{
  q: "The adjective <b>present</b> means ______.",
  a: ["có mặt", "hiện tại", "món quà", "trình bày"],
  c: 0
},
{
  q: "The verb <b>represent</b> means ______.",
  a: ["phản đối", "đại diện cho", "hỗ trợ", "tham gia"],
  c: 1
},
{
  q: "The phrase <b>reflect on something</b> means ______.",
  a: ["suy ngẫm về điều gì", "phản đối điều gì", "chỉ trích điều gì", "ghi nhớ điều gì"],
  c: 0
},
{
  q: "The verb <b>reflect</b> (light, image, etc.) means ______.",
  a: ["hấp thụ", "phản chiếu", "che khuất", "làm mờ"],
  c: 1
},
{
  q: "The phrase <b>on reflection</b> means ______.",
  a: ["sau khi suy nghĩ kỹ lại", "ngay lập tức", "theo ý kiến cá nhân", "trong tương lai"],
  c: 0
},
{
  q: "The phrase <b>filthy rich</b> means ______.",
  a: ["cực kỳ giàu có", "rất keo kiệt", "rất nghèo", "rất nổi tiếng"],
  c: 0
},
{
  q: "The phrase <b>a wealth of information</b> means ______.",
  a: ["một lượng thông tin phong phú", "thông tin bí mật", "nguồn thông tin sai lệch", "tài liệu lưu trữ"],
  c: 0
},
{
  q: "The structure <b>express one's opinion</b> means ______.",
  a: ["bảo vệ quan điểm", "thay đổi quan điểm", "bày tỏ ý kiến", "giấu ý kiến"],
  c: 2
},
{
  q: "The noun <b>facial expression</b> means ______.",
  a: ["biểu cảm khuôn mặt", "nét chữ", "cử chỉ tay", "ngôn ngữ cơ thể"],
  c: 0
},
{
  q: "The verb <b>identify</b> means ______.",
  a: ["xác định, nhận dạng", "thay thế", "so sánh", "tách"],
  c: 0
},
{
  q: "The phrase <b>strengths and weaknesses</b> means ______.",
  a: ["điểm mạnh và điểm yếu", "thắng và thua", "lợi ích và chi phí", "quyền lợi và nghĩa vụ"],
  c: 0
},
{
  q: "The structure <b>be appreciative of something</b> means ______.",
  a: ["phụ thuộc vào điều gì", "biết ơn, trân trọng điều gì", "phản đối điều gì", "lo lắng về điều gì"],
  c: 1
},
{
  q: "The word <b>distinguish</b> means ______.",
  a: ["giống", "phân biệt", "hiểu rõ", "giống nhau"],
  c: 1
},
{
  q: "The word <b>identical</b> means ______.",
  a: ["giống hệt nhau", "danh tính", "sự xác minh danh tính", "căn cước công dân"],
  c: 0
},
{
  q: "The phrase <b>take after</b> means ______.",
  a: ["giống một thành viên trong gia đình", "chăm sóc", "hỗ trợ", "phân biệt"],
  c: 0
}
];


// 🔀 RANDOM CÂU + ĐÁP ÁN
let questions = shuffle(originalQuestions.map(q=>{
  let opts = q.a.map((t,i)=>({t,correct:i===q.c}));
  opts = shuffle(opts);
  return {
    q:q.q,
    a:opts.map(o=>o.t),
    c:opts.findIndex(o=>o.correct)
  };
}));

// render
const quizDiv=document.getElementById("quiz");

questions.forEach((q,i)=>{
  let div=document.createElement("div");
  div.className="question";

  let html=`${i+1}. ${q.q}`;

  q.a.forEach((ans,idx)=>{
    html+=`
    <div class="answers">
      <label>
        <input type="radio" name="q${i}" value="${idx}">
        ${String.fromCharCode(65+idx)}. ${ans}
      </label>
    </div>`;
  });

  div.innerHTML=html;
  quizDiv.appendChild(div);
});

// ⏱ timer
let time=900;
let timer=setInterval(()=>{
  let m=Math.floor(time/60);
  let s=time%60;
  document.getElementById("timer").innerText=`⏳ ${m}:${s<10?"0"+s:s}`;
  time--;
  if(time<0){clearInterval(timer);submitQuiz();}
},1000);

// submit
function submitQuiz(){
  let name=document.getElementById("username").value.trim();
  if(!name){alert("Nhập tên!");return;}
let hasEmpty = false;

// kiểm tra câu chưa làm
questions.forEach((q,i)=>{
  let selected=document.querySelector(`input[name=q${i}]:checked`);
  let div=document.getElementsByClassName("question")[i];

  div.classList.remove("unanswered");

  if(!selected){
    div.classList.add("unanswered");
    hasEmpty = true;
  }
});

if(hasEmpty){
  alert("❌ Bạn phải làm hết câu trước khi nộp!");
  return;
}
  clearInterval(timer);

  let score=0;
  let wrongList=[];

  questions.forEach((q,i)=>{
    let selected=document.querySelector(`input[name=q${i}]:checked`);
    if(!selected)return;

    let val=parseInt(selected.value);

    if(val===q.c){
      score++;
    } else {
      wrongList.push({
        question:q.q,
        your:String.fromCharCode(65+val)+". "+q.a[val],
        correct:String.fromCharCode(65+q.c)+". "+q.a[q.c]
      });
    }
  });

  // ⭐ TIME
  let now = new Date().toLocaleString();

  // hiển thị
  let wrongRate = wrongList.length / questions.length;

let resultHTML = `
🎉 <b>${name}</b> đúng <b>${score}/${questions.length}</b><br>
⏰ ${now}<br>
⚠️ TabSwitch: ${tabSwitchCount || 0}<br><br>
`;

if(wrongRate < 0.3){

    resultHTML += `
    <h3>📚 Đáp án các câu sai</h3>
    `;

    wrongList.forEach((w,i)=>{
        resultHTML += `
        <div style="
            border:1px solid #ddd;
            padding:10px;
            margin-bottom:10px;
            border-radius:10px;
            background:#fff8e6;
        ">
            <b>Câu ${i+1}</b><br>
            ${w.question}<br><br>

            ❌ Bạn chọn: <span style="color:red">${w.your}</span><br>
            ✅ Đáp án: <span style="color:green">${w.correct}</span>
        </div>
        `;
    });

}else{

    resultHTML += `
    <div style="
        background:#ffeaea;
        padding:15px;
        border-radius:12px;
        color:#c00000;
        font-weight:bold;
    ">
    ❌ Sai trên 30% mà đòi mấy đáp án của mẹ hả cưng?<br>
    Học bài kỹ vô bữa sau mẹ khảo lại!
    </div>
    `;
}

document.getElementById("result").innerHTML = resultHTML;

  // ⭐ GỬI DATA FULL
  fetch("https://script.google.com/macros/s/AKfycbwKGHpjJy1RxNpGRIHdZtQiPfCrh0OSG24DEzQtRB7Ezlr1aki97aZL0JfQiSwkKmYmrg/exec",{
    method:"POST",
    body:JSON.stringify({
      time: now,
      name: name,
      score: score,
      total: questions.length,
      tabSwitch: tabSwitchCount || 0,
      wrong: wrongList.map((w,i)=>
        (i+1)+". "+w.question+
        " | Bạn chọn: "+w.your+
        " | Đúng: "+w.correct
      ).join("\n")
    })
  });
}

</script>
